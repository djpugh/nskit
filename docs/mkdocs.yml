site_name: NSKit
repo_url: https://github.com/djpugh/nskit/
edit_uri: blob/main/docs/source/
docs_dir: ./source
site_dir: ./html

nav:
  - index.md
  - 'Guides':
      - 'Using a Recipe': guides/using-a-recipe.md
      - 'Updating from a Recipe': guides/updating-from-a-recipe.md
      - 'Building a Recipe': guides/building-a-recipe.md
      - 'Working with Namespaces': guides/namespaces.md
      - 'Platform Integration': guides/platform-integration.md
  - 'Architecture':
      - architecture/index.md
      - 'Recipes': architecture/recipes.md
      - 'The Mixer': architecture/mixer.md
      - 'Docker vs Local Execution': architecture/docker-execution.md
  - 'Developing':
      - developing/index.md
      - developing/license.md
      - developing/sbom.md
      - 'Test Coverage': coverage.md
  - 'API':
      - 'nskit.cli': api/nskit.cli.md
      - 'nskit.client': api/nskit.client.md
      - 'nskit.common': api/nskit.common.md
      - 'nskit.mixer': api/nskit.mixer.md
      - 'nskit.recipes': api/nskit.recipes.md
      - 'nskit.vcs': api/nskit.vcs.md
  - changelog.md
  - 'Issue Tracker': https://github.com/djpugh/nskit/issues

exclude_docs: |
  mkdocs.yml

theme:
  name: material
  icon:
    logo: material/family-tree
  favicon: assets/images/favicon.ico
  palette:
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.prefetch
    - navigation.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
      toc_depth: 6

plugins:
  - search
  - autorefs
  - mkdocstrings:
      default_handler: python
      enable_inventory: true
      handlers:
        python:
          import:
            - https://jinja.palletsprojects.com/en/3.1.x/objects.inv
          paths: [src]
  - mike:
      canonical_version: latest
  - coverage:
      page_name: coverage
      html_report_dir: reports/htmlcov
  - git-revision-date-localized:
      exclude:
        - coverage.md
      type: iso_date
  - include-markdown
  - mkdocs_licenseinfo
  - mkdocs_github_changelog:
      match: '[0-9+].[0-9+].[0-9]+'

extra:
  version:
    provider: mike
