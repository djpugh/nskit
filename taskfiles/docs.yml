version: '3'

tasks:

  serve:
    desc: Serve the documentation locally.
    cmds:
      - uv run mkdocs serve

  build:
    desc: Build the documentation.
    cmds:
      - uv run mkdocs build

  deploy:
    desc: Deploy the documentation to GitHub Pages.
    cmds:
      - uv run mkdocs gh-deploy --force
