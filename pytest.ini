[pytest]
# Pytest configuration for nskit

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=nskit
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml

# Markers
markers =
    integration: Integration tests (deselect with '-m "not integration"')
    slow: Slow running tests (deselect with '-m "not slow"')
    requires_git: Tests requiring git
    requires_network: Tests requiring network access

# Coverage options
[coverage:run]
source = nskit
omit =
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
