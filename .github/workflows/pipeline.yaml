
name: Pipeline
on:
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    types: [published]
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true
env:
  ON_CI: 1

jobs:
  changes:
    name: Get Changed Files
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        fetch-depth: 0
    - name: Get changed files in the src folder
      id: src-changed
      uses: tj-actions/changed-files@v47
      with:
        files: src/**
    - name: List src changes
      if: steps.src-changed.outputs.any_changed == 'true'
      run: |
        echo "One or more files in the src folder has changed."
        echo "List all the files that have changed: ${{ steps.src-changed.outputs.all_changed_files }}"
    - name: Get changed files in the tests folder
      id: tests-changed
      uses: tj-actions/changed-files@v47
      with:
        files: tests/**
    - name: List tests changes
      if: steps.tests-changed.outputs.any_changed == 'true'
      run: |
        echo "One or more files in the tests folder has changed."
        echo "List all the files that have changed: ${{ steps.tests-changed.outputs.all_changed_files }}"
    - name: Get changed files in the root folder
      id: root-changed
      uses: tj-actions/changed-files@v47
      with:
        files: |
            *.{toml,ini}
            tools/**
    - name: List root changes
      if: steps.root-changed.outputs.any_changed == 'true'
      run: |
        echo "One or more config files in the root folder has changed."
        echo "List all the files that have changed: ${{ steps.root-changed.outputs.all_changed_files }}"
    - name: Get changed files in the docs folder
      id: docs-changed
      uses: tj-actions/changed-files@v47
      with:
        files: docs/**
    - name: List docs changes
      if: steps.docs-changed.outputs.any_changed == 'true'
      run: |
        echo "One or more files in the docs folder has changed."
        echo "List all the files that have changed: ${{ steps.docs-changed.outputs.all_changed_files }}"
    - name: Get changed files in the workflows folder
      id: workflows-changed
      uses: tj-actions/changed-files@v47
      with:
        files: .github/workflows/**
    - name: List workflows changes
      if: steps.workflows-changed.outputs.any_changed == 'true'
      run: |
        echo "One or more files in the .github/workflows folder has changed."
        echo "List all the files that have changed: ${{ steps.workflows-changed.outputs.all_changed_files }}"
    - name: Get changed files in the .github folder
      id: tools-changed
      uses: tj-actions/changed-files@v47
      with:
        files: .github/*.{json,properties}
    - name: List tools changes
      if: steps.tools-changed.outputs.any_changed == 'true'
      run: |
        echo "One or more tool configurations in the .github folder has changed."
        echo "List all the files that have changed: ${{ steps.tools-changed.outputs.all_changed_files }}"
    outputs:
      src: ${{ steps.src-changed.outputs.any_changed == 'true'}}
      tests: ${{ steps.tests-changed.outputs.any_changed  == 'true'}}
      root: ${{ steps.root-changed.outputs.any_changed  == 'true'}}
      workflows: ${{ steps.workflows-changed.outputs.any_changed  == 'true'}}
      tools: ${{ steps.tools-changed.outputs.any_changed  == 'true'}}
      docs: ${{ steps.docs-changed.outputs.any_changed  == 'true'}}

  # ── PR-only jobs ──────────────────────────────────────────────

  lint:
    name: Lint
    if: >
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.src || needs.changes.outputs.tools || needs.changes.outputs.root || needs.changes.outputs.workflows)
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}
      - name: Install dependencies
        run: task setup
      - name: Lint
        run: task lint

  test:
    name: Test Python ${{ matrix.py }} - ${{ matrix.os }}
    if: >
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.src || needs.changes.outputs.tests || needs.changes.outputs.root || needs.changes.outputs.workflows)
    runs-on: ${{ matrix.os }}-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    needs: [changes]
    strategy:
      fail-fast: false
      matrix:
        os:
          - "ubuntu"
          - "windows"
          - "macos"
        py:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Set up Python ${{ matrix.py }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.py }}
    - name: Install Task
      uses: go-task/setup-task@v2
      with:
        repo-token: ${{ github.token }}
    - name: Install dependencies
      run: task setup
    - name: Run Test Suite
      run: task test -- unit functional integration smoke
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token}}
    - name: Upload test reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-reports-${{ matrix.py }}-${{ matrix.os }}
        path: |
          reports/*-test.xml
          reports/coverage.xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        directory: ./reports/
        flags: tests
        name: ${{ matrix.py }} - ${{ matrix.os }}
    - name: Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results (${{ matrix.py }} - ${{ matrix.os }})
        path: reports/*-test.xml
        reporter: java-junit
        fail-on-error: false
    - name: Publish Test Results (Linux)
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always() && runner.os == 'Linux'
      with:
        files: reports/*-test.xml
        comment_mode: "off"
        check_name: Unit Tests (${{ matrix.py }} - ${{ matrix.os }})
    - name: Publish Test Results (macOS)
      uses: EnricoMi/publish-unit-test-result-action/macos@v2
      if: always() && runner.os == 'macOS'
      with:
        files: reports/*-test.xml
        comment_mode: "off"
        check_name: Unit Tests (${{ matrix.py }} - ${{ matrix.os }})
    - name: Publish Test Results (Windows)
      uses: EnricoMi/publish-unit-test-result-action/windows@v2
      if: always() && runner.os == 'Windows'
      with:
        files: reports/*-test.xml
        comment_mode: "off"
        check_name: Unit Tests (${{ matrix.py }} - ${{ matrix.os }})
    - name: Coverage Comment
      uses: orgoro/coverage@v3.2
      if: matrix.os == 'ubuntu' && matrix.py == '3.12'
      continue-on-error: true
      with:
        coverageFile: reports/coverage.xml
        token: ${{ github.token }}
        thresholdAll: 0.80
        thresholdNew: 0.90
        thresholdModified: 0.80

  sonarcloud:
    name: SonarCloud
    if: >
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.src || needs.changes.outputs.root || needs.changes.outputs.workflows)
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=djpugh_nskit
            -Dsonar.organization=djpugh
            -Dsonar.coverage.exclusions=**/*.*
            -Dsonar.sources=src

  license-scan:
    name: Scan Licenses
    if: >
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.root || needs.changes.outputs.workflows)
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: compile requirements.txt
        run: |
          python -m pip install --upgrade pip pip-tools
          pip-compile -o requirements.txt
          cat requirements.txt
      - name: Run FOSSA scan and upload build data
        uses: fossa-contrib/fossa-action@v3
        with:
          fossa-api-key: ${{ secrets.FOSSA_API_KEY }}
          github-token: ${{ github.token }}

  codeql-analyze:
    name: CodeQL Analyze
    if: >
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.src || needs.changes.outputs.root || needs.changes.outputs.workflows)
    runs-on: ubuntu-latest
    needs: [changes]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: python
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4

  docs:
    name: Build docs
    if: >
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.src || needs.changes.outputs.root || needs.changes.outputs.docs || needs.changes.outputs.workflows)
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}
      - name: Install dependencies
        run: task setup
      - name: Configure Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
      - name: Build docs
        id: build_docs
        run: task docs:build
      - name: Select Branch
        run: git checkout ${{ steps.build_docs.outputs.branch_name}}
      - name: Store Docs Artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs
          path: .

  # ── Shared jobs (PR + release) ────────────────────────────────

  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          clean: true
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}
      - name: Build nskit
        run: task build
      - name: Store build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: dist/*

  test-build:
    name: Test Build Python ${{ matrix.py }} - ${{ matrix.os }}
    needs: [build, test]
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - "ubuntu"
          - "windows"
          - "macos"
        py:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: ./repo
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python ${{ matrix.py }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.py }}
      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}
      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: build
          path: dist
      - name: Install wheel and test dependencies
        shell: bash
        run: |
          uv pip install --system "$(ls -t dist/*.whl | head -n1)[github]"
          cd repo && uv pip install --system --group test
      - name: Run unit tests
        shell: bash
        run: pytest ./repo/tests/unit
      - name: Run functional tests
        shell: bash
        run: pytest ./repo/tests/functional
      - name: Run integration tests
        shell: bash
        run: pytest ./repo/tests/integration
      - name: Run smoke tests
        shell: bash
        run: pytest ./repo/tests/smoke
        env:
          GITHUB_TOKEN: ${{ github.token}}

  # ── PR aggregator ─────────────────────────────────────────────

  ci:
    name: CI
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs: [lint, test, build, test-build, docs]
    steps:
      - run: |
          result="${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}"
          echo "result: $result"
          exit $( [ "$result" = "success" ] && echo 0 || echo 1 )

  # ── Release-only jobs ─────────────────────────────────────────

  publish-package:
    name: Publish Package
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [build, test-build]
    environment:
      name: pypi
      url: https://pypi.org/p/nskit
    permissions:
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: build
          path: dist
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-docs:
    name: Publish Docs
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [docs, publish-package]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          repo-token: ${{ github.token }}
      - name: Get Version
        id: get_version
        run: |
          tag_name="${{ github.event.release.tag_name }}"
          echo "tag_name=$tag_name" >> $GITHUB_OUTPUT
          echo "major=$(echo $tag_name | cut -d. -f1)" >> $GITHUB_OUTPUT
          echo "minor=$(echo $tag_name | cut -d. -f2)" >> $GITHUB_OUTPUT
          echo "patch=$(echo $tag_name | cut -d. -f3)" >> $GITHUB_OUTPUT
      - name: Check Tag doesn't exist
        id: check_tag
        run: |
          if git show-ref --tags docs-${{ steps.get_version.outputs.tag_name }} --quiet; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Install dependencies
        run: task setup
      - name: Deploy
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          uv run mike deploy -u "${{ steps.get_version.outputs.major }}.${{ steps.get_version.outputs.minor}}" latest --config-file docs/mkdocs.yml -p
          uv run mike set-default latest --config-file docs/mkdocs.yml
          git checkout gh-pages
          git pull origin
          git tag docs-${{ steps.get_version.outputs.tag_name }}
          git push origin docs-${{ steps.get_version.outputs.tag_name }}
